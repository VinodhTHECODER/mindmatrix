<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INFINIX TRAVELS.com</title>

<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }
header { background: #d32f2f; color: white; padding: 15px; text-align: center; }

.page { display: none; padding: 20px; }
.active { display: block; }

.card { background: white; padding: 15px; margin: 10px 0; border-radius: 10px; }

button { padding: 10px; background: #d32f2f; color: white; border: none; cursor: pointer; }

input, select { padding: 10px; margin: 8px 0; width: 100%; }

/* Seat Layout */
.seat-row { display: flex; justify-content: center; }
.seat {
    width: 45px; height: 45px;
    margin: 5px;
    background: #4CAF50;
    display: flex; align-items: center; justify-content: center;
    border-radius: 5px; cursor: pointer;
}
.aisle { width: 30px; }
.booked { background: red; cursor: not-allowed; }
.selected { background: yellow; }

.receipt { background: white; padding: 20px; border-radius: 10px; }
</style>
</head>

<body>

<header>INFINIX BUS BOOKING SYSTEM</header>

<!-- MAIN PAGE -->
<div id="mainPage" class="page active">
    <h3>Search Journey</h3>
    <input id="from" placeholder="From">
    <input id="to" placeholder="To">
    <input id="date" type="date">
    <button onclick="searchBuses()">Search Buses</button>

    <button onclick="showTickets()">🎫 Booked Tickets</button>

    <div id="busList"></div>
</div>

<!-- SEAT PAGE -->
<div id="seatPage" class="page">
    <button onclick="showPage('mainPage')">⬅ Back</button>
    <h3 id="busTitle"></h3>
    <div id="seatLayout"></div>
    <h4 id="totalPrice">Total: ₹0</h4>
    <button onclick="goPassenger()">Continue</button>
</div>

<!-- PASSENGER PAGE -->
<div id="passengerPage" class="page">
    <button onclick="showPage('seatPage')">⬅ Back</button>
    <h3>Passenger Details</h3>

    <input id="name" placeholder="Name">
    <input id="age" type="number" placeholder="Age">
    <input id="mobile" placeholder="Mobile Number">

    <select id="gender">
        <option>Male</option>
        <option>Female</option>
    </select>

    <button onclick="goPayment()">Proceed to Payment</button>
</div>

<!-- PAYMENT PAGE -->
<div id="paymentPage" class="page">
    <button onclick="showPage('passengerPage')">⬅ Back</button>
    <h3>Payment</h3>

    <p id="paymentInfo"></p>

    <h4>Payment Method</h4>
    <select id="paymentMethod">
        <option>UPI</option>
        <option>Card</option>
    </select>

    <div id="upiBox">
        <input placeholder="Enter UPI ID">
    </div>

    <div id="cardBox" style="display:none;">
        <input placeholder="Card Number">
        <input placeholder="Expiry">
        <input placeholder="CVV">
    </div>

    <button onclick="confirmPayment()">Pay Now</button>
</div>

<!-- RECEIPT PAGE -->
<div id="receiptPage" class="page">
    <h3>🎉 Booking Successful</h3>
    <div id="receipt" class="receipt"></div>
    <button onclick="showPage('mainPage')">Book Another</button>
</div>

<!-- TICKETS PAGE -->
<div id="ticketsPage" class="page">
    <button onclick="showPage('mainPage')">⬅ Back</button>
    <h3>Booked Tickets</h3>
    <div id="ticketsList"></div>
</div>

<script>
let buses = [];
let bookings = [];
let currentBusIndex;
let selectedSeats = [];
let journey = { from:"", to:"", date:"" };

// Generate buses
for (let i = 1; i <= 12; i++) {
    let booked = [];
    for (let j = 0; j < 8; j++) {
        booked.push(Math.floor(Math.random() * 40));
    }

    buses.push({
        name: "Bus " + i,
        price: 400 + i * 50,
        time: (6 + i) + ":00",
        vehicle: "TN0" + i + "AB" + (1000 + i),
        driver: {
            name: "Driver " + i,
            phone: "9" + Math.floor(100000000 + Math.random()*900000000)
        },
        bookedSeats: booked
    });
}

// Search
function searchBuses() {
    journey.from = document.getElementById("from").value || "Chennai";
    journey.to = document.getElementById("to").value || "Bangalore";
    journey.date = document.getElementById("date").value || "Today";
    loadBuses();
}

// Load buses
function loadBuses() {
    let html = "";
    buses.forEach((bus, i) => {
        let available = 40 - bus.bookedSeats.length;

        html += `
        <div class="card">
            <h4>${bus.name}</h4>
            <p>${journey.from} → ${journey.to}</p>
            <p>Date: ${journey.date}</p>
            <p>Time: ${bus.time}</p>
            <p>Price: ₹${bus.price}</p>
            <p>Available Seats: ${available}</p>
            <button onclick="openSeats(${i})">Book</button>
        </div>`;
    });

    document.getElementById("busList").innerHTML = html;
}

// Seat page
function openSeats(i) {
    currentBusIndex = i;
    selectedSeats = [];
    showPage("seatPage");

    document.getElementById("busTitle").innerText = buses[i].name;

    let layout = document.getElementById("seatLayout");
    layout.innerHTML = "";

    for (let r = 0; r < 10; r++) {
        let row = document.createElement("div");
        row.className = "seat-row";

        for (let c = 0; c < 4; c++) {

            if (c === 2) {
                let gap = document.createElement("div");
                gap.className = "aisle";
                row.appendChild(gap);
            }

            let num = r * 4 + c;

            let seat = document.createElement("div");
            seat.className = "seat";
            seat.innerText = num + 1;

            if (buses[i].bookedSeats.includes(num)) {
                seat.classList.add("booked");
            }

            seat.onclick = () => {
                if (seat.classList.contains("booked")) return;

                seat.classList.toggle("selected");

                if (selectedSeats.includes(num)) {
                    selectedSeats = selectedSeats.filter(s => s !== num);
                } else {
                    selectedSeats.push(num);
                }

                updatePrice();
            };

            row.appendChild(seat);
        }

        layout.appendChild(row);
    }
}

function updatePrice() {
    let total = selectedSeats.length * buses[currentBusIndex].price;
    document.getElementById("totalPrice").innerText = "Total: ₹" + total;
}

// Passenger
function goPassenger() {
    if (selectedSeats.length === 0) return alert("Select seats first");
    showPage("passengerPage");
}

// Payment
function goPayment() {
    let name = document.getElementById("name").value;
    let age = document.getElementById("age").value;
    let mobile = document.getElementById("mobile").value;

    if (!name || !age || !mobile) return alert("Fill all details");

    let bus = buses[currentBusIndex];
    let total = selectedSeats.length * bus.price;

    document.getElementById("paymentInfo").innerText =
        `Bus: ${bus.name}
Route: ${journey.from} → ${journey.to}
Date: ${journey.date}
Time: ${bus.time}
Seats: ${selectedSeats.map(s=>s+1).join(", ")}
Passenger: ${name}
Mobile: ${mobile}
Total: ₹${total}`;

    showPage("paymentPage");
}

// Toggle payment
document.getElementById("paymentMethod").onchange = function() {
    if (this.value === "UPI") {
        upiBox.style.display = "block";
        cardBox.style.display = "none";
    } else {
        upiBox.style.display = "none";
        cardBox.style.display = "block";
    }
};

// Confirm payment
function confirmPayment() {
    let bus = buses[currentBusIndex];

    bus.bookedSeats.push(...selectedSeats);

    bookings.push({
        busIndex: currentBusIndex,
        seats: [...selectedSeats],
        name: document.getElementById("name").value,
        mobile: document.getElementById("mobile").value,
        journey: {...journey}
    });

    let receiptHTML = `
    <h4>${bus.name}</h4>
    <p><b>Route:</b> ${journey.from} → ${journey.to}</p>
    <p><b>Date:</b> ${journey.date}</p>
    <p><b>Time:</b> ${bus.time}</p>
    <p><b>Vehicle:</b> ${bus.vehicle}</p>

    <hr>

    <p><b>Seats:</b> ${selectedSeats.map(s=>s+1).join(", ")}</p>
    <p><b>Name:</b> ${document.getElementById("name").value}</p>
    <p><b>Mobile:</b> ${document.getElementById("mobile").value}</p>

    <hr>

    <p><b>Driver:</b> ${bus.driver.name}</p>
    <p><b>Phone:</b> ${bus.driver.phone}</p>

    <hr>

    <h3>Total Paid: ₹${selectedSeats.length * bus.price}</h3>
    `;

    document.getElementById("receipt").innerHTML = receiptHTML;

    showPage("receiptPage");
    loadBuses();
}

// Show tickets
function showTickets() {
    showPage("ticketsPage");

    let html = "";

    bookings.forEach((b, index) => {
        let bus = buses[b.busIndex];

        html += `
        <div class="card">
            <h4>${bus.name}</h4>
            <p>${b.journey.from} → ${b.journey.to}</p>
            <p>Date: ${b.journey.date}</p>
            <p>Seats: ${b.seats.map(s=>s+1).join(", ")}</p>
            <p>Name: ${b.name}</p>
            <button onclick="cancelTicket(${index})">Cancel</button>
        </div>`;
    });

    document.getElementById("ticketsList").innerHTML = html || "No bookings yet";
}

// Cancel ticket
function cancelTicket(index) {
    let booking = bookings[index];
    let bus = buses[booking.busIndex];

    bus.bookedSeats = bus.bookedSeats.filter(
        s => !booking.seats.includes(s)
    );

    bookings.splice(index, 1);

    alert("Ticket Cancelled ❌");

    showTickets();
    loadBuses();
}

// Navigation
function showPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
